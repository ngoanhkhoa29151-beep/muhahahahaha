<!DOCTYPE html>
<html>
<head>
<title>System Breach</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
color:#0f0;
font-family:monospace;
}

canvas{
position:fixed;
top:0;
left:0;
}

#hack{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
}

#hack h1{
color:red;
font-size:70px;
animation:blink 0.7s infinite;
}

#hack p{
font-size:28px;
color:white;
display:none;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div id="hack">
<h1>YOU HAVE BEEN HACKED</h1>
<p id="troll">Relax 😂 This is just a troll</p>
</div>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01HACKED";
letters = letters.split("");

let fontSize = 16;
let columns = canvas.width / fontSize;

let drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


// sau 6 giây hiện chữ hack

setTimeout(()=>{

document.getElementById("hack").style.display="block";

setTimeout(()=>{
document.getElementById("troll").style.display="block";
},4000);

},6000);

</script>

</body>
</html>
