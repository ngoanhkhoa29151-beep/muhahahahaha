<!DOCTYPE html>
<html>
<head>
<title>System Breach</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:#0f0;
}

canvas{
position:fixed;
top:0;
left:0;
}

#scan{
position:absolute;
top:20%;
width:100%;
text-align:center;
font-size:28px;
}

#hack{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
}

#hack h1{
color:red;
font-size:70px;
animation:blink 0.6s infinite;
}

#relax{
display:none;
font-size:30px;
color:white;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="scan"></div>

<div id="hack">
<h1>YOU HAVE BEEN HACKED</h1>
<p id="relax">😂 Relax — this is just a troll</p>
</div>

<script>

// MATRIX EFFECT

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01HACK";
letters=letters.split("");

let fontSize=16;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


// SCAN TEXT

let steps=[
"Scanning device...",
"Accessing system files...",
"Bypassing firewall...",
"Downloading private data..."
];

let i=0;

function scan(){

if(i<steps.length){
document.getElementById("scan").innerHTML=steps[i];
i++;
setTimeout(scan,1500);
}else{

document.getElementById("scan").style.display="none";
document.getElementById("hack").style.display="block";

// SCREEN SHAKE

setInterval(()=>{
document.body.style.transform=
"translate("+(Math.random()*12-6)+"px,"+(Math.random()*12-6)+"px)";
},80);

// SHOW RELAX

setTimeout(()=>{
document.getElementById("relax").style.display="block";
},4000);

}

}

setTimeout(scan,3000);

</script>

</body>
</html>
